name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: geofence/package-lock.json

      - name: Install
        working-directory: geofence
        run: npm ci

      - name: Build
        working-directory: geofence
        run: npm run build

      - name: Assemble publish folder
        run: |
          mkdir -p _site/geofence
          cp -r geofence/dist/. _site/geofence/
          # Preserve existing root-level prototypes
          [ -f c-tooltip-style.html ] && cp c-tooltip-style.html _site/ || true
          [ -f order-management-drawer.html ] && cp order-management-drawer.html _site/ || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
